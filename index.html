<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lanchonete Pereque - Cardapio Online</title>
  <meta name="description" content="Peca lanches, refrigerantes, acai e combos direto pelo cardapio online da Lanchonete Pereque.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="store-header">
    <div class="store-cover" aria-hidden="true"></div>
    <div class="store-info">
      <div>
        <span class="status">Aberto agora</span>
        <h1>Lanchonete Pereque</h1>
        <p>X-tudo, combos, refrigerantes gelados e acai no Parque Mambucaba.</p>
      </div>
      <div class="store-meta">
        <strong>35-50 min</strong>
        <span>Entrega estimada</span>
      </div>
    </div>
  </header>

  <main class="shop">
    <section class="menu-area">
      <nav class="category-tabs" aria-label="Categorias">
        <button class="active" data-category="todos">Todos</button>
        <button data-category="lanches">Lanches</button>
        <button data-category="combos">Combos</button>
        <button data-category="bebidas">Bebidas</button>
        <button data-category="sobremesas">Sobremesas</button>
      </nav>

      <div class="section-title">
        <h2>Cardapio</h2>
        <p>Escolha seus itens e finalize o pedido pelo WhatsApp da lanchonete.</p>
      </div>

      <div id="productGrid" class="product-grid"></div>
    </section>

    <aside class="cart-panel" aria-label="Carrinho">
      <div class="cart-card">
        <h2>Seu pedido</h2>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <form id="checkoutForm" class="checkout-form">
          <label>Seu nome<input name="name" placeholder="Ex: Mariana" required></label>
          <label>Telefone<input name="phone" placeholder="(24) 99999-0000" required></label>
          <label>Endereco<input name="address" placeholder="Rua, numero e bairro" required></label>
          <button class="checkout-button" type="submit">Enviar pedido</button>
        </form>
        <small>O pedido sera enviado para a lanchonete pelo WhatsApp.</small>
      </div>
    </aside>
  </main>

  <div id="toast" class="toast"></div>
  <script src="./app.js"></script>
</body>
</html>
